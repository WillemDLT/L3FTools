name: Package addon

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run verifier
        run: PYTHON=python3 bash ./verify.sh

      - name: Build addon zip
        run: git archive --prefix=L3FTools/ --format=zip -o L3FTools.zip HEAD

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
        run: |
          if [ "$REF" = "main" ]; then
            TAG="live"; PRE=""
          else
            TAG="beta"; PRE="--prerelease"
          fi
          # `gh release view` is flaky -- it can return non-zero on
          # transient API hiccups even when the release exists, which
          # then makes `gh release create` fail with
          # "Release.tag_name already exists" (the 0.23.2 failure mode).
          # Just attempt create unconditionally; swallow the "already
          # exists" error. Then upload with --clobber, which overwrites
          # the asset on an existing release.
          gh release create "$TAG" $PRE --title "$TAG" \
              --notes "Auto-packaged on every push to the $REF branch. Download L3FTools.zip and extract it straight into Interface/AddOns/ - no renaming needed." \
              || echo "Release $TAG already exists, skipping create."
          gh release upload "$TAG" L3FTools.zip --clobber
